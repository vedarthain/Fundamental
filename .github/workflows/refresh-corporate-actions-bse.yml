# Corporate actions — FRESH dividends from BSE (free), 2×/week.
#
# Complements the monthly indianapi sweep (refresh-corporate-actions.yml):
#   - indianapi = full history + splits/bonus/rights/board-meetings (monthly).
#   - BSE       = recent dividends only (its free per-stock endpoint returns
#                 ~the last 5 actions, mostly dividends), but FREE so we run it
#                 often to keep newly-declared dividends current between the
#                 monthly indianapi runs.
#
# Coexistence: scripts/fetch-corporate-actions.py writes source='bse' and its
# ON CONFLICT never clobbers an indianapi row; the indianapi fetcher's delete is
# source-scoped so it won't wipe these. The stock page dedups on
# (action_type, ex_date) preferring indianapi — so no duplicate rows show.
#
# Cadence: Tue + Fri 05:17 UTC = 10:47 IST. Off-the-hour to dodge GitHub's
# top-of-hour scheduler contention. ON CONFLICT makes every run idempotent, so a
# partial/timed-out run is harmless — the next run completes it.
#
# Required secret: NEON_APP_URL. (BSE needs no API key.)

name: Refresh corporate actions (BSE)

on:
  schedule:
    - cron: '17 5 * * 2,5'   # Tue & Fri, 05:17 UTC = 10:47 IST
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    # ~1,630 mapped symbols at ~0.4s throttle + latency ≈ 25–35 min; 55 margin.
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install psycopg
        run: pip install 'psycopg[binary]==3.2.*'

      - name: Fetch dividends from BSE
        env:
          APP_DB_URL:       ${{ secrets.NEON_APP_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch-corporate-actions.py
