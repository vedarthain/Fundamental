# Corporate-actions refresh — full history from indianapi.in.
#
# Populates app.corporate_action via scripts/fetch-corporate-actions-iapi.py:
# one call per stock to indianapi's /corporate_actions (accepts our NSE symbol
# directly), returning dividends + splits + bonus + rights + board meetings
# (results dates). Far richer than the BSE path — it supersedes it (atomic
# per-symbol replace, source='indianapi'). The BSE fetcher
# (fetch-corporate-actions.py) is kept as a free fallback but no longer
# scheduled.
#
# CADENCE — MONTHLY (1st, 04:30 UTC = 10:00 IST). Why: the Hobby plan is
# 5,000 requests/month + 1 req/sec, and a full ~2,160-symbol refresh is one
# call each (~43% of the monthly budget, ~40 min at the rate limit). Corporate
# actions move slowly, so monthly is ample; weekly would blow the quota.
#
# Required secrets:
#   NEON_APP_URL          — Postgres URL for fundamental_app on Neon
#   INDIANAPI_KEY         — the auth HEADER NAME (e.g. x-api-key)
#   INDIANAPI_KEY_VALUE   — the API key value
#   (add the last two under Settings → Secrets and variables → Actions)

name: Refresh corporate actions

on:
  schedule:
    - cron: '30 4 1 * *'   # 1st of each month, 04:30 UTC = 10:00 IST
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    # ~2,160 calls at the 1 req/s limit ≈ 40 min; 55 leaves margin. A 429
    # (quota hit) makes the script stop gracefully with a partial save.
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install psycopg
        run: pip install 'psycopg[binary]==3.2.*'

      - name: Fetch corporate actions from indianapi.in
        env:
          APP_DB_URL:          ${{ secrets.NEON_APP_URL }}
          INDIANAPI_KEY:       ${{ secrets.INDIANAPI_KEY }}
          INDIANAPI_KEY_VALUE: ${{ secrets.INDIANAPI_KEY_VALUE }}
          PYTHONUNBUFFERED:    "1"
        run: python scripts/fetch-corporate-actions-iapi.py
