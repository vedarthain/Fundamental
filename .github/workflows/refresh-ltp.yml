# End-of-day data pipeline. Runs every weekday after market close,
# sequencing every job that needs to land before the next morning's
# /market dashboard render.
#
# Pipeline (each step is idempotent; failure of a downstream step does
# NOT roll back earlier writes — that's by design, daily rerun safe):
#
#   1. refresh-ltp.py          NSE bhavcopy → screener_meta.current_price,
#                              market_cap_cr recompute, cluster_stocks_panel_cache
#                              refresh, golden.price_history OHLC insert.
#   2. fetch-indices.py        NSE indices CSV → app.market_index_history
#                              (so /market top tiles aren't frozen on yesterday's
#                              close).
#   3. fetch-fii-dii.py        NSE FII/DII JSON → app.fii_dii_flow (one new row
#                              per trading day; cheap upsert).
#   4. build-market-snapshot.py  Rebuilds app.market_snapshot_cache so /market
#                              reflects today's prices + indices + flows on
#                              the next page render.
#   5. /api/revalidate         Purges Next.js Data Cache (sectors + market +
#                              snapshot tags) so users get fresh data on the
#                              next request, not whatever 1-hour cached blob
#                              Vercel was serving.
#
# Why a GitHub Action (not local launchd):
#   - NSE bhavcopy is daily; you don't want to remember to refresh prices
#   - Runs in GitHub's cloud, no laptop dependency
#   - Single CSV download for bhavcopy + targeted fetches for indices + FII
#     stay well under any rate limit
#
# Required secrets (set once, manually via Settings → Secrets → Actions):
#   NEON_APP_URL      — Postgres URL for fundamental_app on Neon
#   NEON_GOLDEN_URL   — Postgres URL for golden_db on Neon (OHLC write)
#   REVALIDATE_TOKEN  — bearer for the /api/revalidate cache purge

name: Refresh LTP + OHLC

on:
  # 13:00 UTC = 18:30 IST. Bhavcopy usually publishes by 18:00 IST, so this
  # leaves a 30-minute buffer. Mon-Fri only — NSE doesn't trade on weekends.
  schedule:
    - cron: '0 13 * * 1-5'

  # Manual trigger — useful for backfilling after a missed run or testing
  # workflow changes. Visible in the Actions UI under "Run workflow".
  workflow_dispatch: {}

# Opt the JavaScript-based actions (checkout, setup-python) into Node 24.
# GitHub is deprecating Node 20 on the runners — forced default June 2026,
# fully removed September 2026. Setting this env at the workflow level
# avoids the deprecation warnings now and survives the cutover untouched.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install psycopg
        run: pip install 'psycopg[binary]==3.2.*'

      - name: Refresh LTP + OHLC (bhavcopy)
        env:
          APP_DB_URL:      ${{ secrets.NEON_APP_URL }}
          NEON_GOLDEN_URL: ${{ secrets.NEON_GOLDEN_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/refresh-ltp.py

      # Indices + FII/DII land into their own tables. Failure here doesn't
      # roll back the bhavcopy write above — we still want the LTP refresh
      # to land even if NSE's index CSV is temporarily 404 or their
      # FII/DII JSON is rate-limited. Both scripts are idempotent.
      - name: Refresh NSE indices
        env:
          APP_DB_URL:       ${{ secrets.NEON_APP_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch-indices.py
        continue-on-error: true

      # Index membership (NSE per-index list CSVs → app.index_constituent),
      # powering the /indices constituents view. Changes only at NSE's
      # semi-annual rebalance, so daily is overkill but harmless (~14 small
      # CSVs, idempotent atomic replace). Soft-fail so a 404 here never
      # blocks the rest of the refresh.
      - name: Refresh index constituents
        env:
          APP_DB_URL:       ${{ secrets.NEON_APP_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch-index-constituents.py
        continue-on-error: true

      - name: Refresh FII / DII flows
        env:
          APP_DB_URL:       ${{ secrets.NEON_APP_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch-fii-dii.py
        continue-on-error: true

      # Rebuild the precomputed /market response into app.market_snapshot_cache.
      # Reads from BOTH app + golden; needs both URLs in env. Without this
      # step /market keeps serving yesterday's baked JSON even after the
      # daily refresh lands fresh prices.
      - name: Rebuild /market snapshot cache
        env:
          APP_DB_URL:    ${{ secrets.NEON_APP_URL }}
          GOLDEN_DB_URL: ${{ secrets.NEON_GOLDEN_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/build-market-snapshot.py

      # Tell Vercel to drop the cached Next.js responses tagged for these
      # surfaces. Fail loudly on non-200 — the previous silent-failure mode
      # masked a token/cache misconfiguration for multiple runs (users had
      # to tap the in-app "Purge cache" button to see fresh data). When the
      # step does fail now, the response body is dumped to the log so the
      # cause (wrong token, missing env, route 500) is immediately visible.
      - name: Purge Next.js Data Cache
        run: |
          set +e
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -X POST "https://equityroots.in/api/revalidate" \
            -H "Authorization: Bearer ${{ secrets.REVALIDATE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"tags":["market","panel-cache","snapshot","sectors"]}')
          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat "$RESPONSE_FILE"
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cache purge failed (HTTP $HTTP_CODE) — check REVALIDATE_TOKEN secret matches Vercel."
            exit 1
          fi
