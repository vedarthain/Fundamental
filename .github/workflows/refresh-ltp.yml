# Refresh LTP + OHLC every weekday after market close.
#
# What this does:
#   1. Picks the most recent NSE bhavcopy (walks back from today)
#   2. Parses it for equity scrips (EQ / BE / BZ / BL series)
#   3. UPDATEs app.screener_meta.current_price on Neon for every symbol
#      we already track (the LTP shown on cards/headers)
#   4. INSERTs today's OHLC bar into golden.price_history (interval='1d')
#      on Neon — powers /sectors 1W/1M/1Y returns and the universe
#      momentum percentile in the scorer
#
# Why a GitHub Action (not local launchd):
#   - NSE bhavcopy is daily; you don't want to remember to refresh prices
#   - Runs in GitHub's cloud, no laptop dependency
#   - Single CSV download covers both LTP and OHLC needs — no rate-limit
#     risk and ~30 second runtime (vs ~30 min for a per-symbol yfinance
#     approach we tried and rejected)
#
# Required secrets (set once, manually):
#   NEON_APP_URL    — Postgres URL for fundamental_app on Neon (LTP write)
#   NEON_GOLDEN_URL — Postgres URL for golden_db on Neon (OHLC write)
#   Add via Repo Settings → Secrets and variables → Actions.

name: Refresh LTP + OHLC

on:
  # 13:00 UTC = 18:30 IST. Bhavcopy usually publishes by 18:00 IST, so this
  # leaves a 30-minute buffer. Mon-Fri only — NSE doesn't trade on weekends.
  schedule:
    - cron: '0 13 * * 1-5'

  # Manual trigger — useful for backfilling after a missed run or testing
  # workflow changes. Visible in the Actions UI under "Run workflow".
  workflow_dispatch: {}

# Opt the JavaScript-based actions (checkout, setup-python) into Node 24.
# GitHub is deprecating Node 20 on the runners — forced default June 2026,
# fully removed September 2026. Setting this env at the workflow level
# avoids the deprecation warnings now and survives the cutover untouched.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install psycopg
        run: pip install 'psycopg[binary]==3.2.*'

      - name: Refresh LTP + OHLC
        env:
          APP_DB_URL:      ${{ secrets.NEON_APP_URL }}
          NEON_GOLDEN_URL: ${{ secrets.NEON_GOLDEN_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/refresh-ltp.py
