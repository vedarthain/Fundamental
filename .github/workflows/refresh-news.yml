# Market news refresh — aggregate broadcaster RSS into app.news.
#
# scripts/fetch-news.py pulls free RSS (Economic Times, LiveMint, Hindu
# BusinessLine, Moneycontrol), dedups, stores headline+summary+link only, and
# best-effort tags each headline to the stocks it mentions (clean BSE names via
# ISIN). No API key, no quota — so we can run it often.
#
# Trigger: cron-job.org ONLY, via the /api/cron/refresh-news route, which
# dispatches this workflow through the GitHub API. We deliberately do NOT use
# GitHub's `schedule:` — top-of-hour scheduled events get load-shed and whole
# batches of hourly runs silently never fired. workflow_dispatch events are
# reliable, so an external pinger gives us dependable timing without GitHub's
# flaky cron. (RSS is free + the script prunes to a 30-day window, so frequent
# runs are cheap. Each run also does ~1 BSE scrip-master call.)
#
# Required secret: NEON_APP_URL.

name: Refresh news

on:
  # Dispatched by cron-job.org → /api/cron/refresh-news (no GitHub schedule).
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install psycopg
        run: pip install 'psycopg[binary]==3.2.*'

      - name: Aggregate news from RSS
        env:
          APP_DB_URL:       ${{ secrets.NEON_APP_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch-news.py
