# Refresh daily OHLC bars from yfinance into Neon's golden.price_history.
#
# What this does:
#   1. Reads the list of active NSE symbols from Neon's app.universe
#   2. Fetches the last 7 days of daily bars via yfinance for each symbol
#   3. INSERT ... ON CONFLICT DO NOTHING into Neon's golden.price_history
#
# Companion to refresh-ltp.yml:
#   - refresh-ltp.yml updates app.screener_meta.current_price (today's LTP
#     for header/card display) — runs at 13:00 UTC (just after bhavcopy)
#   - refresh-ohlc.yml updates golden.price_history (historical OHLC for
#     1W/1M/1Y returns on /sectors) — runs at 17:30 UTC (lets yfinance
#     settle post-close)
#
# Why a GitHub Action vs local launchd:
#   - Removes the laptop-must-be-on dependency for production data freshness
#   - Failures show in the Actions tab, easy to diagnose
#   - Public repos get unlimited GHA minutes — costs nothing
#
# Required secrets (set once in Repo Settings → Secrets and variables → Actions):
#   NEON_APP_URL    — postgres URL for fundamental_app on Neon (read-only need)
#   NEON_GOLDEN_URL — postgres URL for golden_db on Neon (write access)

name: Refresh OHLC

on:
  # 17:30 UTC = 23:00 IST. NSE close is 15:30 IST; yfinance typically has
  # final-print data within ~30-60 minutes. The 7.5h buffer is generous so
  # we don't fetch partial days. Mon-Fri only.
  schedule:
    - cron: '30 17 * * 1-5'

  # Manual trigger — useful for backfilling a missed day or for first
  # validation after deploy. Visible in Actions UI under "Run workflow".
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    # 2,150 symbols × 0.3s throttle = ~12 min minimum + per-symbol fetch
    # latency. 30 min is comfortable headroom; 60 min would catch a
    # yfinance slowdown without hanging the job indefinitely.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install 'psycopg[binary]==3.2.*' 'yfinance>=0.2.40'

      - name: Refresh OHLC
        env:
          NEON_APP_URL:    ${{ secrets.NEON_APP_URL }}
          NEON_GOLDEN_URL: ${{ secrets.NEON_GOLDEN_URL }}
        run: python scripts/refresh-ohlc.py
