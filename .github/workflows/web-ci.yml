# Web CI — typecheck + lint on PRs only.
#
# What this does:
#   1. Installs web/ dependencies (npm ci against package-lock.json)
#   2. Runs `tsc --noEmit` — catches TypeScript errors
#   3. Runs `npm run lint` — catches ESLint errors
#
# Why this exists:
#   A change that broke `tsc` would still deploy to Vercel and either 500 or
#   serve a stale ISR cache. This workflow runs in ~60s on PRs so failures
#   show up before merge.
#
# Why PR-only (not push): direct pushes to main were firing CI on every
# commit and eating GitHub Actions minutes. CI now runs only on pull requests
# to main; local typecheck (npx tsc --noEmit) covers direct-to-main work.
#
# What this does NOT do:
#   - Full `next build` — Vercel does that on every deploy with the real
#     env vars (DB URLs etc.). Running it here would either need those
#     secrets exposed to CI or fail on data-fetching during prerender.
#   - Tests — there aren't any yet. Add them when there are.
#
# Cost: GitHub Actions free tier covers this comfortably (~60s per run).

name: Web CI

on:
  pull_request:
    branches: [main]
    paths:
      # Only run when web/ actually changes. Saves CI minutes on backend
      # work that doesn't touch the front-end.
      - 'web/**'
      - '.github/workflows/web-ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache npm install across runs based on the lockfile hash.
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
