# Weekly FULL refresh + score — runs entirely in the cloud against Neon,
# no laptop dependency. Every Sunday after market close it re-scrapes
# fundamentals from Screener, recomputes metrics + scores, rebuilds the
# /market dashboard cache, and purges the CDN.
#
# Why weekly: persistence is a 4-snapshot rolling window; weekly matches how
# a long-term investor re-evaluates conviction (daily would inflate noise).
# Fundamentals only change quarterly, but re-fetching weekly keeps the raw
# Screener blobs on Neon fresh and catches earnings updates within a week.
#
# Pipeline (each step depends on the previous):
#
#   1. fetch-many            Scrape Screener for all active symbols. Writes
#                            fundamentals_annual/quarterly + the raw xlsx
#                            blobs into app.screener_export_raw ON NEON.
#                            THIS is what makes cloud scoring correct — the
#                            valuation pillar reads market cap from those
#                            blobs (load_meta_from_raw). Without fresh blobs
#                            on Neon, valuation is NULL for ~91% of stocks
#                            (the DQ failure we hit when computing on Neon
#                            without ever fetching there).
#                            stop_on_auth_fail=True means it HALTS if the
#                            Screener cookies have expired — that's the
#                            signal to rotate the secrets (see below).
#
#   2. prune raw blobs       screener_export_raw is append-only; keep only
#                            the latest blob per symbol so Neon storage stays
#                            bounded (~70 MB instead of growing ~70 MB/week).
#
#   3. compute-metrics       Derive metrics_snapshot from the fresh
#                            fundamentals + golden prices + the blobs.
#
#   4. score                 Percentile + composite scorer → app.scores +
#                            cluster_stocks_panel_cache (the persistence
#                            table) for today's snapshot_date.
#
#   5. build-market-snapshot Rebuild app.market_snapshot_cache so /market
#                            reflects the new snapshot.
#
#   6. /api/revalidate       Purge Vercel's Data Cache for the changed tags.
#
# Required secrets:
#   NEON_APP_URL        — Postgres URL for fundamental_app on Neon (needs
#                         INSERT on screener_export_raw; use the owner role)
#   NEON_GOLDEN_URL     — Postgres URL for golden_db on Neon
#   REVALIDATE_TOKEN    — bearer for the /api/revalidate cache purge
#   SCREENER_SESSIONID  — Screener session cookie  ┐ ROTATE ~MONTHLY. When
#   SCREENER_CSRFTOKEN  — Screener CSRF cookie      ┘ they expire, step 1
#                         fails with an auth error — copy fresh values from
#                         your browser (Screener.in → DevTools → Application →
#                         Cookies) into Settings → Secrets → Actions.

name: Weekly Refresh + Score

on:
  # 13:00 UTC Saturday = 18:30 IST. Market closed ~27h; the intraday pingers
  # don't run on weekends, so this contends with nothing (avoids the
  # deadlock we saw on a manual mid-market run).
  schedule:
    - cron: '0 13 * * 6'

  # Manual trigger — for the first cloud run, testing, or a re-run.
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: 'YYYY-MM-DD to snapshot (default: today UTC)'
        required: false
      skip_fetch:
        description: 'Skip the Screener scrape (re-score on existing data)'
        required: false
        type: boolean
        default: false
      force_full_fetch:
        description: 'Re-scrape ALL symbols, ignoring the 20h freshness skip'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Fetch is capped at --max-runtime-min 120 (graceful), then compute ~45 +
    # score ~15 + rebuild ~3. 180 leaves margin so the score steps are never
    # the thing that gets killed; the fetch cap (not this timeout) is what
    # bounds a throttled scrape.
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fundamental-etl
        run: pip install -e ./etl

      # 1. Scrape Screener → fundamentals + raw blobs on Neon. Skippable via
      #    the workflow_dispatch input for a quick re-score. Real cookies
      #    come from secrets; expiry halts the run (rotate cue).
      - name: Fetch fundamentals from Screener
        if: ${{ github.event.inputs.skip_fetch != 'true' }}
        env:
          APP_DB_URL:           ${{ secrets.NEON_APP_URL }}
          GOLDEN_DB_URL:        ${{ secrets.NEON_GOLDEN_URL }}
          SCREENER_SESSIONID:   ${{ secrets.SCREENER_SESSIONID }}
          SCREENER_CSRFTOKEN:   ${{ secrets.SCREENER_CSRFTOKEN }}
          PYTHONUNBUFFERED:     "1"
        # Default pacing (3 workers, 1s throttle) — proved 99.5% from the
        # runner in ~45 min. The scraper now retries 5xx with backoff, so the
        # occasional transient 502/503 recovers instead of skipping a symbol;
        # no need to crawl.
        #
        # --max-runtime-min caps the scrape so a throttled week (like
        # 2026-06-06, which only reached 900/2157 before timeout-minutes killed
        # the whole job mid-scrape — leaving an ARCHIVE GAP) stops gracefully
        # (exit 0) and the score step below STILL runs. Unscraped symbols
        # resume next run via skip_recent_hours; fundamentals are quarterly, so
        # a partial scrape still scores correctly. 120 min leaves ample room
        # under timeout-minutes for compute + score + rebuild.
        #
        # force_full_fetch=true adds --skip-recent-hours 0 to re-scrape EVERY
        # symbol regardless of when it was last pulled (the normal run skips
        # anything fresh within 20h). If a throttled full re-scrape doesn't
        # finish inside the 120-min budget, a plain re-run (default 20h skip)
        # resumes the symbols it didn't reach.
        run: >
          python -m fundamental_etl.cli fetch-many --max-runtime-min 120
          ${{ github.event.inputs.force_full_fetch == 'true' && '--skip-recent-hours 0' || '' }}

      # 2. Keep only the latest raw blob per symbol — bounds Neon storage.
      - name: Prune old raw blobs
        if: ${{ github.event.inputs.skip_fetch != 'true' }}
        env:
          APP_DB_URL: ${{ secrets.NEON_APP_URL }}
        run: |
          python -c "
          import os, psycopg
          with psycopg.connect(os.environ['APP_DB_URL']) as c, c.cursor() as cur:
              cur.execute('''
                  DELETE FROM app.screener_export_raw r
                  USING (SELECT symbol, max(fetched_at) AS mx
                           FROM app.screener_export_raw GROUP BY symbol) k
                  WHERE r.symbol = k.symbol AND r.fetched_at < k.mx
              ''')
              print('pruned old blobs:', cur.rowcount)
              c.commit()
          "

      # 3 + 4. Compute metrics then score. compute-metrics now reads FRESH
      #        blobs (from step 1), so valuation populates correctly.
      #        SCREENER_* dummies satisfy pydantic-settings (these commands
      #        don't scrape).
      - name: Compute metrics + score
        env:
          APP_DB_URL:           ${{ secrets.NEON_APP_URL }}
          GOLDEN_DB_URL:        ${{ secrets.NEON_GOLDEN_URL }}
          SCREENER_SESSIONID:   "unused-in-score"
          SCREENER_CSRFTOKEN:   "unused-in-score"
          PYTHONUNBUFFERED:     "1"
        run: |
          SNAP_ARG=""
          if [ -n "${{ github.event.inputs.snapshot_date }}" ]; then
            SNAP_ARG="--snapshot ${{ github.event.inputs.snapshot_date }}"
          fi
          python -m fundamental_etl.cli compute-metrics $SNAP_ARG
          python -m fundamental_etl.cli score $SNAP_ARG

      # 5. Rebuild the /market dashboard blob.
      - name: Rebuild /market snapshot cache
        env:
          APP_DB_URL:    ${{ secrets.NEON_APP_URL }}
          GOLDEN_DB_URL: ${{ secrets.NEON_GOLDEN_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/build-market-snapshot.py

      # 6. Purge the CDN so users see the new snapshot. Fail loudly on non-200.
      - name: Purge Next.js Data Cache
        run: |
          set +e
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -X POST "https://equityroots.in/api/revalidate" \
            -H "Authorization: Bearer ${{ secrets.REVALIDATE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"tags":["market","panel-cache","snapshot","sectors"]}')
          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat "$RESPONSE_FILE"
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cache purge failed (HTTP $HTTP_CODE) — check REVALIDATE_TOKEN secret matches Vercel."
            exit 1
          fi
