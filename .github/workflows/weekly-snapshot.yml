# Weekly snapshot pipeline. Runs every Sunday after market close so the
# next week of /market, /watchlist, and /stock/[symbol]→Trend has fresh
# cluster-adjusted persistence data to compare against.
#
# Why weekly (not daily): persistence is designed as a 4-snapshot rolling
# window. Daily snapshots would inflate cluster-rotation noise; weekly
# matches how a long-term investor actually re-evaluates conviction.
#
# Pipeline:
#
#   1. fundamental_etl score   Runs the percentile + composite scorer for
#                              today's date. Inserts a new row per
#                              (snapshot_date, symbol) into:
#                                - app.cluster_composite_cache
#                                - app.cluster_stocks_panel_cache   ← the
#                                  table the persistence feature reads.
#                              Also refreshes cluster_returns + DQ checks.
#
#   2. build-market-snapshot.py  Recomputes app.market_snapshot_cache so
#                              the /market dashboard reflects the new
#                              snapshot's Building strength rows.
#
#   3. /api/revalidate         Purges Vercel's Data Cache for the affected
#                              tags so users see fresh persistence data on
#                              the next render, not whatever 1-hour-old
#                              snapshot the CDN was holding.
#
# Required secrets (already used by refresh-ltp.yml):
#   NEON_APP_URL      — Postgres URL for fundamental_app on Neon
#   NEON_GOLDEN_URL   — Postgres URL for golden_db on Neon
#   REVALIDATE_TOKEN  — bearer for the /api/revalidate cache purge

name: Weekly Snapshot + Score

on:
  # 13:00 UTC Sunday = 18:30 IST. NSE has been closed for ~48h by then;
  # weekend gives bhavcopy and any backfill time to settle before we
  # snapshot. Sunday matches the existing snapshot cadence (the seed row
  # is 2026-05-24, a Sunday).
  schedule:
    - cron: '0 13 * * 0'

  # Manual trigger — useful for backfilling missed Sundays or testing
  # workflow changes without waiting a week.
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: 'YYYY-MM-DD to snapshot (default: today UTC)'
        required: false

# Force Node 24 on the JS-based actions for the same reason refresh-ltp does:
# avoids the Node 20 deprecation warnings and survives the June 2026 cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install the etl package (editable) so `python -m fundamental_etl.cli`
      # resolves. This pulls in psycopg + typer + pydantic-settings too.
      - name: Install fundamental-etl
        run: pip install -e ./etl

      # Score + refresh all four caches in one shot. Score is idempotent
      # for a given snapshot_date (DELETE+INSERT inside the command), so a
      # manual re-run for the same date is safe.
      #
      # pydantic-settings requires screener_sessionid/csrftoken to load
      # even though `score` doesn't scrape. Dummy values keep it happy.
      - name: Run score command
        env:
          APP_DB_URL:           ${{ secrets.NEON_APP_URL }}
          GOLDEN_DB_URL:        ${{ secrets.NEON_GOLDEN_URL }}
          SCREENER_SESSIONID:   "unused-in-score"
          SCREENER_CSRFTOKEN:   "unused-in-score"
          PYTHONUNBUFFERED:     "1"
        run: |
          if [ -n "${{ github.event.inputs.snapshot_date }}" ]; then
            python -m fundamental_etl.cli score --snapshot "${{ github.event.inputs.snapshot_date }}"
          else
            python -m fundamental_etl.cli score
          fi

      # Rebuild app.market_snapshot_cache so /market picks up the new
      # snapshot's Building strength rows on the next render. Without this,
      # /market keeps serving the previous snapshot's baked JSON until the
      # next refresh-ltp.yml run rebuilds it as a side-effect.
      - name: Rebuild /market snapshot cache
        env:
          APP_DB_URL:    ${{ secrets.NEON_APP_URL }}
          GOLDEN_DB_URL: ${{ secrets.NEON_GOLDEN_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/build-market-snapshot.py

      # Tell Vercel to drop cached Next.js responses for the surfaces the
      # weekly snapshot just changed. "panel-cache" covers /sectors and
      # watchlist; "market" covers /market; "snapshot" is the snapshot-date
      # invalidation tag. Fail loudly on non-200 — silent cache failures
      # were a real outage class on refresh-ltp before we hardened it.
      - name: Purge Next.js Data Cache
        run: |
          set +e
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -X POST "https://equityroots.in/api/revalidate" \
            -H "Authorization: Bearer ${{ secrets.REVALIDATE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"tags":["market","panel-cache","snapshot","sectors"]}')
          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat "$RESPONSE_FILE"
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cache purge failed (HTTP $HTTP_CODE) — check REVALIDATE_TOKEN secret matches Vercel."
            exit 1
          fi
